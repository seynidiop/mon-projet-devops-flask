version: '3.8'

services:
  # Notre application Web Flask
  web-app:
    build: .
    container_name: flask-web-app
    ports:
      - "5000:5000"
    volumes:
      - ./instance:/app/instance
    networks:
      - devops-network

  # Le collecteur de métriques (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-server
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    networks:
      - devops-network

  # Le visualiseur graphique (Grafana)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana-dashboard
    ports:
      - "3000:3000"
    networks:
      - devops-network
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Mot de passe par défaut pour te connecter

networks:
  devops-network:
    driver: bridge
