<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - DevOps Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-cyan: #06b6d4;
            --accent-purple: #818cf8;
            --btn-gradient: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Barre de navigation moderne */
        .navbar {
            background: rgba(15, 23, 42, 0.6) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: 1px;
            color: var(--text-main) !important;
        }

        .navbar-brand span {
            color: var(--accent-cyan);
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-weight: 500;
            transition: all 0.3s ease;
            border-radius: 8px;
            margin: 0 5px;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent-cyan) !important;
            background: rgba(6, 182, 212, 0.1);
        }

        /* Cartes style "Glassmorphism" */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h2 {
            font-weight: 700;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Champs du formulaire stylisés */
        .form-label {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-control {
            background: rgba(15, 23, 42, 0.5) !important;
            border: 1px solid var(--glass-border) !important;
            color: var(--text-main) !important;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--accent-cyan) !important;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2) !important;
        }

        /* Bouton dynamique */
        .btn-custom {
            background: var(--btn-gradient);
            color: white;
            border: none;
            font-weight: 600;
            border-radius: 10px;
            padding: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }

        .btn-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.5);
            color: white;
        }

        /* Tableau sombre moderne */
        .table {
            color: var(--text-main) !important;
            margin-top: 20px;
        }

        .table th {
            color: var(--accent-cyan) !important;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--glass-border) !important;
        }

        .table td {
            border-bottom: 1px solid var(--glass-border) !important;
            padding: 16px 12px;
            vertical-align: middle;
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fa-solid fa-cubes-stacked me-2"></i>DEV<span>OPS</span></a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link px-3" href="/"><i class="fa-solid fa-pen-to-square me-2"></i>Formulaire</a>
                <a class="nav-link px-3" href="/records"><i class="fa-solid fa-database me-2"></i>Enregistrements</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
