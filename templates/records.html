{% extends "base.html" %}
{% block title %}Données{% endblock %}
{% block content %}
<div class="glass-card">
    <h2 class="mb-4">Base de Données <small class="fs-6 opacity-50">(SQLite)</small></h2>
    <table class="table table-dark table-hover bg-transparent">
        <thead><tr><th>ID</th><th>Nom</th><th>Email</th><th>Status</th></tr></thead>
        <tbody>
            {% for u in utilisateurs %}
            <tr><td>#{{u.id}}</td><td>{{u.nom}}</td><td>{{u.email}}</td><td><span class="badge bg-success">Actif</span></td></tr>
            {% else %}
            <tr><td colspan="4" class="text-center py-5">Aucun enregistrement trouvé.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/" class="btn btn-outline-light btn-sm mt-3">Retour au formulaire</a>
</div>
{% endblock %}
